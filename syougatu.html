    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .speaker-1-bg { background-color: #ffffff; }
        .speaker-2-bg { background-color: #f0fdf4; } /* Light green for variety */

        .kanji-hidden {
            display: inline-block;
            background-color: #fef08a; /* Yellow-200 */
            border-bottom: 2px dashed #ca8a04;
            border-radius: 4px;
            padding: 0 4px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .kanji-hidden:hover {
            background-color: #fde047;
        }
        .kanji-revealed {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background-color: #1e40af;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease-out;
            white-space: nowrap;
            z-index: 10;
        }
        .kanji-hidden.show-ruby .kanji-revealed {
            opacity: 1;
            transform: translateX(-50%) translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen pb-12">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md">
                    <i class="fa-solid fa-language text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">日本語 Learning</h1>
            </div>
            
            <div class="flex bg-gray-100 p-1 rounded-lg">
                <button id="tab-btn-conv" class="px-4 py-2 rounded-md bg-white shadow text-blue-600 font-medium text-sm transition-all">
                    <i class="fa-regular fa-comments mr-1"></i> Conversation
                </button>
                <button id="tab-btn-quiz" class="px-4 py-2 rounded-md text-gray-500 hover:text-gray-700 font-medium text-sm transition-all">
                    <i class="fa-solid fa-pen-to-square mr-1"></i> Kanji Quiz
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        
        <!-- TAB 1: Conversation -->
        <div id="tab-conv">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                
                <!-- Controls Bar -->
                <div class="bg-gray-50/50 p-4 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                    
                    <div class="flex flex-col sm:flex-row items-center gap-2 w-full sm:w-auto">
                        <select id="scene-selector" class="w-full sm:w-auto bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 shadow-sm font-medium">
                            <!-- Options populated by JS -->
                        </select>

                        <!-- Roleplay Selector -->
                        <select id="roleplay-selector" class="w-full sm:w-auto bg-purple-50 border border-purple-200 text-purple-800 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block p-2 font-medium shadow-sm">
                            <option value="none">👤 Roleplay: Off</option>
                            <option value="Speaker 1">🔇 Mute Speaker 1</option>
                            <option value="Speaker 2">🔇 Mute Speaker 2</option>
                        </select>

                        <button onclick="playEntireScene()" id="play-scene-btn" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center justify-center gap-2 text-sm shadow-sm">
                            <i class="fa-solid fa-play"></i> Play
                        </button>
                    </div>

                    <div class="flex flex-wrap justify-center gap-4 text-sm font-medium text-gray-600">
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                            <input type="checkbox" id="toggle-kanji-test" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                            Hide Furigana
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                            <input type="checkbox" id="toggle-translation" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                            English
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                            <input type="checkbox" id="toggle-romaji" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                            Romaji
                        </label>
                    </div>
                </div>

                <!-- Dialogue Area -->
                <div class="p-4 sm:p-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-50/30 min-h-[500px]">
                    <div id="dialogue-list" class="flex flex-col gap-6">
                        <!-- Dialogue bubbles inserted by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB 2: Kanji Quiz -->
        <div id="tab-quiz" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-10 text-center max-w-2xl mx-auto">
                <div id="quiz-intro">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">漢字の読み方テスト</h2>
                    <p class="text-gray-500 mb-6">会話で使われた漢字の読み方を当てる10問のクイズです。</p>
                    <button onclick="startQuiz()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-transform transform hover:scale-105">
                        スタート (Start)
                    </button>
                </div>

                <div id="quiz-area" class="hidden">
                    <div class="flex justify-between items-center text-sm font-medium text-gray-500 mb-6">
                        <span id="quiz-progress" class="bg-gray-100 py-1 px-3 rounded-full">Question 1/10</span>
                        <span id="quiz-score" class="text-green-600">Score: 0</span>
                    </div>
                    
                    <h3 id="quiz-question" class="text-3xl sm:text-4xl font-bold text-gray-800 mb-8 py-6 bg-gray-50 rounded-xl border border-gray-100">
                        <!-- Question -->
                    </h3>
                    
                    <div id="quiz-options" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Options buttons -->
                    </div>
                </div>

                <div id="quiz-result" class="hidden">
                    <div class="text-6xl mb-4">🏆</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">お疲れ様でした！</h2>
                    <p class="text-xl text-gray-600 mb-6">Your Score: <span id="final-score" class="font-bold text-green-600 text-3xl"></span> / 10</p>
                    <button onclick="startQuiz()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-colors">
                        もう一度プレイ (Play Again)
                    </button>
                </div>
            </div>
        </div>
    </main>

        let scenes = [];

        function parseData() {
            const rawScenes = rawData.trim().split('===');
            scenes = rawScenes.map(sceneText => {
                const lines = sceneText.trim().split('\n').filter(line => line.length > 0);
                return {
                    lines: lines.map(line => {
                        const [jpPart, enPart] = line.split('|');
                        const speakerSplit = jpPart.split(':');
                        const speaker = speakerSplit[0].trim();
                        let rawJp = speakerSplit.slice(1).join(':').trim();
                        
                        const speakText = rawJp.replace(/\(.*?\)/g, '');
                        
                        return {
                            speaker: speaker,
                            rawJp: rawJp,
                            speakText: speakText,
                            english: enPart ? enPart.trim() : "Translation not available.",
                            romaji: generateRomaji(rawJp)
                        };
                    })
                };
            });
        }

        function generateRomaji(rawJp) {
            // 漢字(ふりがな) のフォーマットから、漢字を消して「ふりがな」だけのテキストを抽出
            const readingText = rawJp.replace(/([\u4E00-\u9FFF\u3005]+)\((.*?)\)/g, "$2");
            
            if (window.wanakana) {
                // WanaKana.jsを使って、ひらがな/カタカナをローマ字に変換
                let romaji = wanakana.toRomaji(readingText);
                
                // 文頭を大文字にする簡易的な整形
                romaji = romaji.charAt(0).toUpperCase() + romaji.slice(1);
                return romaji;
            }
            return readingText; // ライブラリが読み込めなかった場合のフォールバック
        }

        function formatJapanese(rawJp, hideFurigana) {
            // 正規表現を修正し、漢字（と「々」）の直後にあるカッコのみを「ふりがな」として処理します
            return rawJp.replace(/([\u4E00-\u9FFF\u3005]+)\((.*?)\)/g, (match, kanji, ruby) => {
                if (hideFurigana) {
                    return `<span class="kanji-hidden" onclick="revealFurigana(this)"><span class="kanji-text">${kanji}</span><span class="kanji-revealed">${ruby}</span></span>`;
                } else {
                    return `<ruby>${kanji}<rt>${ruby}</rt></ruby>`;
                }
            });
        }

        window.revealFurigana = function(element) {
            element.classList.toggle('show-ruby');
        };

                const html = `
                    <div class="flex gap-3 max-w-[95%] sm:max-w-[85%] ${alignment} fade-in" style="animation-delay: ${index * 0.05}s">
                        ${isSpeaker1 ? `<div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid ${icon} ${iconColor} text-sm"></i></div>` : ''}
                        
                        <div class="flex flex-col gap-1 w-full">
                            <div class="text-xs text-gray-500 font-medium px-1 ${!isSpeaker1 ? 'text-right' : ''}">${line.speaker} ${isMuted ? ' <span class="text-purple-600 font-bold ml-1"><i class="fa-solid fa-microphone-lines"></i> Your Turn</span>' : ''}</div>
                            <div class="${bgColor} ${borderRadius} p-4 shadow-sm relative group w-full transition-shadow duration-300">
                                <div class="flex items-start gap-3 justify-between">
                                    <div class="flex-1 ${blurClass}" ${titleText}>
                                        <div class="text-[1.05rem] leading-loose break-words tracking-wide font-medium">
                                            ${jpFormatted}
                                        </div>
                                        ${extraContent}
                                    </div>
                                    <button onclick="playAudio('${line.speakText.replace(/'/g, "\\'")}')" class="shrink-0 w-8 h-8 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-400 hover:text-blue-600 flex items-center justify-center transition-colors focus:outline-none focus:ring-2 focus:ring-blue-300" title="Play audio">
                                        <i class="fa-solid fa-volume-high"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        ${!isSpeaker1 ? `<div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid ${icon} ${iconColor} text-sm"></i></div>` : ''}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function playAudio(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop current playing
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        async function playEntireScene() {
            if (!('speechSynthesis' in window)) return;
            
            const playBtnIcon = document.querySelector('#play-scene-btn i');

            if (appState.isPlaying) {
                window.speechSynthesis.cancel();
                appState.isPlaying = false;
                playBtnIcon.className = 'fa-solid fa-play';
                document.querySelectorAll('#dialogue-list > div > div > div.p-4').forEach(b => b.classList.remove('ring-2', 'ring-blue-400', 'ring-purple-400'));
                return;
            }

            appState.isPlaying = true;
            playBtnIcon.className = 'fa-solid fa-stop';
            const scene = scenes[appState.currentSceneIndex];
            
            for (let i = 0; i < scene.lines.length; i++) {
                if (!appState.isPlaying) break; 
                
                const line = scene.lines[i];
                const isMuted = appState.roleplayMutedSpeaker === line.speaker;

                const allMessageBubbles = document.querySelectorAll('#dialogue-list > div > div > div.p-4');
                if (allMessageBubbles[i]) {
                    allMessageBubbles.forEach(b => b.classList.remove('ring-2', 'ring-blue-400', 'ring-purple-400'));
                    allMessageBubbles[i].classList.add('ring-2', isMuted ? 'ring-purple-400' : 'ring-blue-400');
                    allMessageBubbles[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                if (isMuted) {
                    const waitTime = 1500 + (line.speakText.length * 150);
                    await new Promise(r => setTimeout(r, waitTime));
                } else {
                    await new Promise(resolve => {
                        const utterance = new SpeechSynthesisUtterance(line.speakText);
                        utterance.lang = 'ja-JP';
                        utterance.rate = 0.85;
                        utterance.onend = resolve;
                        utterance.onerror = resolve;
                        window.speechSynthesis.speak(utterance);
                    });
                }
                
                await new Promise(r => setTimeout(r, 600));
            }

            if (appState.isPlaying) {
                document.querySelectorAll('#dialogue-list > div > div > div.p-4').forEach(b => b.classList.remove('ring-2', 'ring-blue-400', 'ring-purple-400'));
            }

            appState.isPlaying = false;
            playBtnIcon.className = 'fa-solid fa-play';
        }

        function startQuiz() {
            appState.score = 0;
            appState.currentQuestionIndex = 0;
            
            document.getElementById('quiz-intro').classList.add('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            
            loadQuestion();
        }

        function loadQuestion() {
            appState.isAnswering = false;
            const qData = quizData[appState.currentQuestionIndex];
            
            // --- 選択肢をランダムにシャッフルする処理を追加 ---
            let shuffledOptions = qData.options.map((opt, index) => {
                return { text: opt, isCorrect: index === qData.answer };
            });
            
            for (let i = shuffledOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
            }
            
            // シャッフル後の新しい「正解のインデックス」を保存
            appState.currentCorrectIndex = shuffledOptions.findIndex(opt => opt.isCorrect);
            // ----------------------------------------------

            document.getElementById('quiz-progress').innerText = `Question ${appState.currentQuestionIndex + 1} / ${quizData.length}`;
            document.getElementById('quiz-score').innerText = `Score: ${appState.score}`;
            document.getElementById('quiz-question').innerText = qData.q;
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            // シャッフルされた選択肢を描画
            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-white border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-gray-700 font-bold py-4 px-6 rounded-xl text-lg sm:text-xl transition-all shadow-sm";
                btn.innerText = opt.text;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (appState.isAnswering) return;
            appState.isAnswering = true;
            
            // シャッフル後に保存した正解インデックスを使って判定
            const correctIndex = appState.currentCorrectIndex;
            const isCorrect = selectedIndex === correctIndex;
            
            if (isCorrect) {
                appState.score++;
                btnElement.classList.remove('border-gray-200', 'hover:border-blue-500', 'hover:bg-blue-50', 'text-gray-700');
                btnElement.classList.add('bg-green-500', 'text-white', 'border-green-500');
            } else {
                btnElement.classList.remove('border-gray-200', 'hover:border-blue-500', 'hover:bg-blue-50', 'text-gray-700');
                btnElement.classList.add('bg-red-500', 'text-white', 'border-red-500');
                
                // Highlight correct answer
                const allButtons = document.getElementById('quiz-options').children;
                allButtons[correctIndex].classList.remove('border-gray-200');
                allButtons[correctIndex].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
            }
            
            document.getElementById('quiz-score').innerText = `Score: ${appState.score}`;
            
            setTimeout(() => {
                appState.currentQuestionIndex++;
                if (appState.currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1200);
        }

        function showResult() {
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('quiz-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = appState.score;
        }

        function switchTab(tabId) {
            appState.activeTab = tabId;
            
            const convBtn = document.getElementById('tab-btn-conv');
            const quizBtn = document.getElementById('tab-btn-quiz');
            const convDiv = document.getElementById('tab-conv');
            const quizDiv = document.getElementById('tab-quiz');
            
            if (tabId === 'conv') {
                convBtn.className = "px-4 py-2 rounded-md bg-white shadow text-blue-600 font-medium text-sm transition-all";
                quizBtn.className = "px-4 py-2 rounded-md text-gray-500 hover:text-gray-700 font-medium text-sm transition-all";
                convDiv.classList.remove('hidden');
                quizDiv.classList.add('hidden');
            } else {
                quizBtn.className = "px-4 py-2 rounded-md bg-white shadow text-blue-600 font-medium text-sm transition-all";
                convBtn.className = "px-4 py-2 rounded-md text-gray-500 hover:text-gray-700 font-medium text-sm transition-all";
                quizDiv.classList.remove('hidden');
                convDiv.classList.add('hidden');
                
                // Reset Quiz
                document.getElementById('quiz-intro').classList.remove('hidden');
                document.getElementById('quiz-area').classList.add('hidden');
                document.getElementById('quiz-result').classList.add('hidden');
            }
        }

        window.onload = () => {
            parseData();

            const selector = document.getElementById('scene-selector');
            scenes.forEach((_, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = sceneTitles[i] || `Scene ${i + 1}`;
                selector.appendChild(opt);
            });

            selector.addEventListener('change', (e) => {
                appState.currentSceneIndex = parseInt(e.target.value);
                if(appState.isPlaying) playEntireScene(); // Stop if playing
                renderScene();
            });

            document.getElementById('toggle-romaji').addEventListener('change', (e) => {
                appState.showRomaji = e.target.checked;
                renderScene();
            });

            document.getElementById('toggle-translation').addEventListener('change', (e) => {
                appState.showTranslation = e.target.checked;
                renderScene();
            });

            document.getElementById('toggle-kanji-test').addEventListener('change', (e) => {
                appState.hideFurigana = e.target.checked;
                renderScene();
            });

            document.getElementById('roleplay-selector').addEventListener('change', (e) => {
                appState.roleplayMutedSpeaker = e.target.value;
                renderScene();
            });

            document.getElementById('tab-btn-conv').addEventListener('click', () => switchTab('conv'));
            document.getElementById('tab-btn-quiz').addEventListener('click', () => switchTab('quiz'));

            renderScene();
        };
    </script>
</body>
</html>
