        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
        }
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.65rem;
            color: #6b7280;
        }
        .speaker-1-bg { background-color: #ffffff; }
        .speaker-2-bg { background-color: #e0f2fe; }
        
        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3b82f6;
        }
        
        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        function kanaToRomaji(text) {
            const map = {
                'あ':'a', 'い':'i', 'う':'u', 'え':'e', 'お':'o',
                'か':'ka', 'き':'ki', 'く':'ku', 'け':'ke', 'こ':'ko',
                'さ':'sa', 'し':'shi', 'す':'su', 'せ':'se', 'そ':'so',
                'た':'ta', 'ち':'chi', 'つ':'tsu', 'て':'te', 'と':'to',
                'な':'na', 'に':'ni', 'ぬ':'nu', 'ね':'ne', 'の':'no',
                'は':'ha', 'ひ':'hi', 'ふ':'fu', 'へ':'he', 'ほ':'ho',
                'ま':'ma', 'み':'mi', 'む':'mu', 'め':'me', 'も':'mo',
                'や':'ya', 'ゆ':'yu', 'よ':'yo',
                'ら':'ra', 'り':'ri', 'る':'ru', 'れ':'re', 'ろ':'ro',
                'わ':'wa', 'を':'o', 'ん':'n',
                'が':'ga', 'ぎ':'gi', 'ぐ':'gu', 'げ':'ge', 'ご':'go',
                'ざ':'za', 'じ':'ji', 'ず':'zu', 'ぜ':'ze', 'ぞ':'zo',
                'だ':'da', 'ぢ':'ji', 'づ':'zu', 'で':'de', 'ど':'do',
                'ば':'ba', 'び':'bi', 'ぶ':'bu', 'べ':'be', 'ぼ':'bo',
                'ぱ':'pa', 'ぴ':'pi', 'ぷ':'pu', 'ぺ':'pe', 'ぽ':'po',
                'きゃ':'kya', 'きゅ':'kyu', 'きょ':'kyo',
                'しゃ':'sha', 'しゅ':'shu', 'しょ':'sho',
                'ちゃ':'cha', 'ちゅ':'chu', 'ちょ':'cho',
                'にゃ':'nya', 'にゅ':'nyu', 'にょ':'nyo',
                'ひゃ':'hya', 'ひゅ':'hyu', 'ひょ':'hyo',
                'みゃ':'mya', 'みゅ':'myu', 'みょ':'myo',
                'りゃ':'rya', 'りゅ':'ryu', 'りょ':'ryo',
                'ぎゃ':'gya', 'ぎゅ':'gyu', 'ぎょ':'gyo',
                'じゃ':'ja', 'じゅ':'ju', 'じょ':'jo',
                'びゃ':'bya', 'びゅ':'byu', 'びょ':'byo',
                'ぴゃ':'pya', 'ぴゅ':'pyu', 'ぴょ':'pyo',
                'ふぁ':'fa', 'ふぃ':'fi', 'ふぇ':'fe', 'ふぉ':'fo',
                'てぃ':'ti', 'でぃ':'di', 'うぃ':'wi', 'うぇ':'we',
                'ー':'-', '、': ', ', '。': '.', '？': '?', '！': '!', '…': '...'
            };
            
            // Convert Katakana to Hiragana first
            let hira = text.replace(/[\u30a1-\u30f6]/g, function(match) {
                return String.fromCharCode(match.charCodeAt(0) - 0x60);
            });

            let romaji = "";
            let i = 0;
            while (i < hira.length) {
                let char2 = hira.substring(i, i+2);
                let char1 = hira.substring(i, i+1);
                
                if (map[char2]) {
                    romaji += map[char2];
                    i += 2;
                } else if (char1 === 'っ') {
                    // Small tsu: double the next consonant
                    let nextChar = hira.substring(i+1, i+2);
                    let nextChar2 = hira.substring(i+1, i+3);
                    let nextRomaji = map[nextChar2] || map[nextChar];
                    if (nextRomaji && nextRomaji.length > 0 && nextRomaji.match(/^[a-z]/i)) {
                        romaji += nextRomaji.charAt(0);
                    }
                    i++;
                } else if (map[char1]) {
                    romaji += map[char1];
                    i++;
                } else {
                    romaji += char1;
                    i++;
                }
            }
            // Capitalize first letter and fix spaces
            romaji = romaji.charAt(0).toUpperCase() + romaji.slice(1);
            return romaji.replace(/\s+/g, ' ').trim();
        }

        const scenes = [];
        let currentScene = { title: "Scene 1", lines: [] };
        let sceneIndexCount = 1;

        const lines = rawData.trim().split('\n');
        for (let line of lines) {
            line = line.trim();
            if (line === '') continue;

            if (line.startsWith('===')) {
                if (currentScene.lines.length > 0) {
                    scenes.push(currentScene);
                }
                sceneIndexCount++;
                // Optional: Provide better titles based on content, but defaulting to Scene N
                currentScene = { title: `Scene ${sceneIndexCount}`, lines: [] };
            } else {
                const parts = line.split('|');
                let jpPart = parts[0].trim();
                let enPart = parts.length > 1 ? parts[1].trim() : "";
                
                const match = jpPart.match(/^(Speaker \d+):\s*(.*)/);
                if (match) {
                    const speaker = match[1];
                    const rawJpText = match[2];
                    
                    // Generate Text for Speech Synthesis (Replace Kanji(Furigana) with Furigana)
                    // This ensures correct pronunciation and avoids reading BOTH kanji and furigana
                    const speakText = rawJpText.replace(/[\u4e00-\u9faf]+\(([\u3040-\u309f]+)\)/g, "$1");
                    
                    currentScene.lines.push({
                        speaker: speaker,
                        rawJp: rawJpText,
                        english: enPart,
                        speakText: speakText,
                        romaji: kanaToRomaji(speakText)
                    });
                }
            }
        }
        if (currentScene.lines.length > 0) {
            scenes.push(currentScene);
        }

        let state = {
            currentSceneIndex: 0,
            showRomaji: false,
            showTranslation: false,
            kanjiTestMode: false,
            isPlaying: false
        };

        function formatJapanese(text, isKanjiTest) {
            // Replaces "漢字(ふりがな)" with appropriate HTML based on mode
            return text.replace(/([\u4e00-\u9faf]+)\(([\u3040-\u309f]+)\)/g, (match, kanji, furigana) => {
                if (isKanjiTest) {
                    return `<span class="inline-block mx-1 kanji-blank cursor-pointer bg-yellow-100 text-yellow-800 border-b-2 border-yellow-400 px-2 py-0.5 rounded shadow-sm hover:bg-yellow-200 transition-colors" onclick="revealKanji(this, '${kanji}', '${furigana}')" title="Tap to reveal Kanji">${furigana}</span>`;
                } else {
                    return `<ruby class="mx-0.5">${kanji}<rt>${furigana}</rt></ruby>`;
                }
            });
        }

        // Global function called from inline HTML
        window.revealKanji = function(el, kanji, furigana) {
            el.outerHTML = `<span class="inline-block mx-1 font-bold text-blue-700 bg-blue-50 px-1 rounded animate-pulse">${kanji}<span class="text-xs text-gray-500 ml-1 font-normal">(${furigana})</span></span>`;
        };

        function renderScene() {
            const container = document.getElementById('dialogue-list');
            container.innerHTML = '';
            
            const scene = scenes[state.currentSceneIndex];
            
            scene.lines.forEach((line, index) => {
                const isSpeaker1 = line.speaker === "Speaker 1";
                const alignment = isSpeaker1 ? "self-start" : "self-end";
                const bgColor = isSpeaker1 ? "speaker-1-bg border border-gray-200" : "speaker-2-bg border border-blue-100";
                const borderRadius = isSpeaker1 ? "rounded-tr-2xl rounded-br-2xl rounded-bl-2xl" : "rounded-tl-2xl rounded-br-2xl rounded-bl-2xl";
                const icon = isSpeaker1 ? "fa-user-tie" : "fa-user";
                const iconColor = isSpeaker1 ? "text-gray-500" : "text-blue-500";

                const jpFormatted = formatJapanese(line.rawJp, state.kanjiTestMode);

                let extraContent = '';
                if (state.showRomaji) {
                    extraContent += `<div class="text-sm text-gray-500 mt-2 font-mono bg-gray-50 p-2 rounded">${line.romaji}</div>`;
                }
                if (state.showTranslation) {
                    extraContent += `<div class="text-sm text-gray-700 mt-2 italic border-l-2 border-gray-300 pl-2">${line.english}</div>`;
                }

                const html = `
                    <div class="flex gap-3 max-w-[90%] sm:max-w-[80%] ${alignment} fade-in" style="animation-delay: ${index * 0.05}s">
                        ${isSpeaker1 ? `<div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid ${icon} ${iconColor} text-sm"></i></div>` : ''}
                        
                        <div class="flex flex-col gap-1">
                            <div class="text-xs text-gray-500 font-medium px-1 ${!isSpeaker1 ? 'text-right' : ''}">${line.speaker}</div>
                            <div class="${bgColor} ${borderRadius} p-4 shadow-sm relative group">
                                <div class="flex items-start gap-3">
                                    <div class="text-lg leading-loose break-words flex-1 tracking-wide">
                                        ${jpFormatted}
                                    </div>
                                    <button onclick="playAudio('${line.speakText.replace(/'/g, "\\'")}')" class="shrink-0 w-8 h-8 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-400 hover:text-blue-500 flex items-center justify-center transition-colors focus:outline-none focus:ring-2 focus:ring-blue-300" title="Play audio">
                                        <i class="fa-solid fa-volume-high"></i>
                                    </button>
                                </div>
                                ${extraContent}
                            </div>
                        </div>

                        ${!isSpeaker1 ? `<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid ${icon} ${iconColor} text-sm"></i></div>` : ''}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function playAudio(text) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85; // Slightly slower for learning
                window.speechSynthesis.speak(utterance);
            } else {
                console.warn("Speech Synthesis not supported in this browser.");
            }
        }

        async function playEntireScene() {
            if (!('speechSynthesis' in window)) return;
            
            if (state.isPlaying) {
                window.speechSynthesis.cancel();
                state.isPlaying = false;
                return;
            }

            state.isPlaying = true;
            const scene = scenes[state.currentSceneIndex];
            
            for (let i = 0; i < scene.lines.length; i++) {
                if (!state.isPlaying) break; // Check if stopped
                
                const line = scene.lines[i];
                // Highlight the message currently being spoken (optional visual feedback)
                
                await new Promise(resolve => {
                    const utterance = new SpeechSynthesisUtterance(line.speakText);
                    utterance.lang = 'ja-JP';
                    utterance.rate = 0.85;
                    
                    utterance.onend = resolve;
                    utterance.onerror = resolve; // Continue even if error
                    
                    window.speechSynthesis.speak(utterance);
                });
                
                // Add a small pause between speakers
                await new Promise(r => setTimeout(r, 600));
            }
            state.isPlaying = false;
        }

        function init() {
            // Populate Scene Selector
            const selector = document.getElementById('scene-selector');
            scenes.forEach((scene, index) => {
                const option = document.createElement('option');
                option.value = index;
                // Add context titles based on the scene content to make it easier for users
                let title = `Scene ${index + 1}`;
                if (index === 0) title += " (Entering)";
                else if (index === 1) title += " (Menu & Asking)";
                else if (index === 2) title += " (Ordering)";
                else if (index === 3) title += " (Requests)";
                else if (index === 4) title += " (Payment)";
                else if (index === 5) title += " (Reservation)";
                else if (index === 6) title += " (Allergies)";
                else if (index === 7) title += " (Complaints)";
                else if (index === 8) title += " (Eating)";
                else if (index === 9) title += " (Leaving)";

                option.textContent = title;
                selector.appendChild(option);
            });

            // Event Listeners
            selector.addEventListener('change', (e) => {
                state.currentSceneIndex = parseInt(e.target.value);
                window.speechSynthesis.cancel();
                state.isPlaying = false;
                renderScene();
                // Scroll to top
                document.getElementById('chat-container').scrollTop = 0;
            });

            document.getElementById('toggle-romaji').addEventListener('change', (e) => {
                state.showRomaji = e.target.checked;
                renderScene();
            });

            document.getElementById('toggle-translation').addEventListener('change', (e) => {
                state.showTranslation = e.target.checked;
                renderScene();
            });

            document.getElementById('toggle-kanji-test').addEventListener('change', (e) => {
                state.kanjiTestMode = e.target.checked;
                renderScene();
            });

            // Initial Render
            renderScene();
        }

        // Run when DOM is ready
        document.addEventListener('DOMContentLoaded', init);
        
        // Stop audio if user leaves page
        window.addEventListener('beforeunload', () => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        });

    </script>
