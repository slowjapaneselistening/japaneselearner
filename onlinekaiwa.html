<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Conversation Learner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
        }
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.65rem;
            color: #6b7280;
        }
        .speaker-1-bg { background-color: #ffffff; }
        .speaker-2-bg { background-color: #e0f2fe; }
        
        /* Custom Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3b82f6;
        }
        
        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Quiz Button animations */
        .quiz-btn {
            transition: all 0.2s ease;
        }
        .quiz-btn:active {
            transform: scale(0.98);
        }
        .correct-answer {
            background-color: #10b981 !important; /* Emerald 500 */
            color: white !important;
            border-color: #059669 !important;
        }
        .wrong-answer {
            background-color: #ef4444 !important; /* Red 500 */
            color: white !important;
            border-color: #dc2626 !important;
        }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- Header & Tabs -->
    <header class="bg-white shadow-sm z-20 shrink-0">
        <div class="max-w-4xl mx-auto px-4 pt-3 flex flex-col gap-3">
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-language text-blue-500"></i>
                <span>Nihongo Learner</span>
            </h1>
            
            <!-- Tab Navigation -->
            <div class="flex gap-1 border-b border-gray-200">
                <button id="tab-btn-conv" class="px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 hover:bg-gray-50 transition-colors">
                    <i class="fa-regular fa-comments mr-1"></i> Conversation
                </button>
                <button id="tab-btn-quiz" class="px-4 py-2 font-medium text-gray-500 border-b-2 border-transparent hover:bg-gray-50 hover:text-gray-700 transition-colors">
                    <i class="fa-solid fa-graduation-cap mr-1"></i> Kanji Quiz
                </button>
            </div>
        </div>
    </header>

    <!-- Conversation View -->
    <div id="view-conv" class="flex-1 flex flex-col min-h-0 relative">
        <!-- Settings Bar -->
        <div class="bg-white border-b border-gray-200 shrink-0 z-10 shadow-sm">
            <div class="max-w-4xl mx-auto px-4 py-2">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-3">
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <select id="scene-selector" class="w-full sm:w-auto bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2">
                            <!-- Options populated by JS -->
                        </select>
                        <button onclick="playEntireScene()" id="play-scene-btn" class="whitespace-nowrap bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-3 rounded-lg transition-colors flex items-center gap-2 text-sm shadow-sm">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </div>

                    <div class="flex flex-wrap items-center justify-center gap-4 text-sm w-full sm:w-auto">
                        <!-- Romaji Toggle -->
                        <div class="flex items-center gap-2">
                            <div class="relative inline-block w-9 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="toggle-romaji" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" />
                                <label for="toggle-romaji" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer transition-colors duration-200 ease-in-out"></label>
                            </div>
                            <label for="toggle-romaji" class="cursor-pointer font-medium text-gray-700">Romaji</label>
                        </div>
                        <!-- Translation Toggle -->
                        <div class="flex items-center gap-2">
                            <div class="relative inline-block w-9 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="toggle-translation" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" />
                                <label for="toggle-translation" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer transition-colors duration-200 ease-in-out"></label>
                            </div>
                            <label for="toggle-translation" class="cursor-pointer font-medium text-gray-700">English</label>
                        </div>
                        <!-- Furigana Hide Toggle -->
                        <div class="flex items-center gap-2 bg-yellow-50 px-2 py-1 rounded-md border border-yellow-200">
                            <div class="relative inline-block w-9 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="toggle-kanji-test" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-yellow-300 appearance-none cursor-pointer transition-transform duration-200 ease-in-out z-10" />
                                <label for="toggle-kanji-test" class="toggle-label block overflow-hidden h-5 rounded-full bg-yellow-200 cursor-pointer transition-colors duration-200 ease-in-out"></label>
                            </div>
                            <label for="toggle-kanji-test" class="cursor-pointer font-medium text-yellow-800 text-xs sm:text-sm"><i class="fa-regular fa-eye-slash mr-1"></i>Hide Furigana</label>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6" id="chat-container">
            <div class="max-w-4xl mx-auto flex flex-col gap-4 pb-20" id="dialogue-list">
                <!-- Messages will be injected here -->
            </div>
        </main>
    </div>

    <!-- Kanji Quiz View -->
    <div id="view-quiz" class="flex-1 hidden bg-gray-50 overflow-y-auto">
        <div class="max-w-2xl mx-auto px-4 py-8">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <!-- Quiz Header -->
                <div class="bg-blue-600 px-6 py-4 flex justify-between items-center text-white">
                    <h2 class="font-bold text-lg"><i class="fa-solid fa-pen-nib mr-2"></i>Kanji Reading Quiz</h2>
                    <div class="font-medium bg-blue-700 px-3 py-1 rounded-full text-sm">
                        <span id="quiz-progress">1 / 10</span>
                    </div>
                </div>
                
                <!-- Quiz Body -->
                <div class="p-6 sm:p-8" id="quiz-body">
                    <!-- Dynamic Quiz Content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // State management
        const appState = {
            activeTab: 'conv', // 'conv' or 'quiz'
            
            // Conversation state
            currentSceneIndex: 0,
            showRomaji: false,
            showTranslation: false,
            hideFurigana: false,
            isPlaying: false,
            
            // Quiz state
            currentQuestionIndex: 0,
            score: 0,
            isAnswering: false // prevents multiple clicks
        };

        // Japanese Conversation Data (Online Conversation Theme)
        const rawData = `

                }
            }
            if(romaji.length > 0) {
                romaji = romaji.charAt(0).toUpperCase() + romaji.slice(1);
            }
            return romaji.replace(/\s+/g, ' ').trim();
        }

        const scenes = [];
        let currentScene = { lines: [] };

        const lines = rawData.trim().split('\n');
        for (let line of lines) {
            line = line.trim();
            if (line === '') continue;

            if (line.startsWith('===')) {
                if (currentScene.lines.length > 0) {
                    scenes.push(currentScene);
                }
                currentScene = { lines: [] };
            } else {
                const parts = line.split('|');
                let jpPart = parts[0].trim();
                let enPart = parts.length > 1 ? parts[1].trim() : "";
                
                const match = jpPart.match(/^(Speaker \d+):\s*(.*)/);
                if (match) {
                    const speaker = match[1];
                    const rawJpText = match[2];
                    
                    const speakText = rawJpText.replace(/[\u4e00-\u9faf]+\(([\u3040-\u309f]+)\)/g, "$1");
                    
                    currentScene.lines.push({
                        speaker: speaker,
                        rawJp: rawJpText,
                        english: enPart,
                        speakText: speakText,
                        romaji: kanaToRomaji(speakText)
                    });
                }
            }
        }
        if (currentScene.lines.length > 0) {
            scenes.push(currentScene);
        }

        const sceneTitles = [
            "Scene 1: 時差と仕事 (Time Difference and Work)",
            "Scene 2: 天気と趣味 (Weather and Hobbies)",
            "Scene 3: 朝ごはんと日本食 (Breakfast and Japanese Food)",
            "Scene 4: 音楽とカラオケ (Music and Karaoke)",
            "Scene 5: 日本語の勉強と将来の夢 (Studying Japanese and Future Dreams)",
            "Scene 6: 仕事と通勤 (Work and Commuting)",
            "Scene 7: ペットと家族 (Pets and Family)",
            "Scene 8: 買い物とインターネット (Shopping and the Internet)",
            "Scene 9: 旅行と雪 (Travel and Snow)",
            "Scene 10: 言語交換と挨拶 (Language Exchange and Greetings)"
        ];

        function formatJapanese(text, hideFurigana) {
            return text.replace(/([\u4e00-\u9faf]+)\(([\u3040-\u309f]+)\)/g, (match, kanji, furigana) => {
                if (hideFurigana) {
                    // ルビを隠して、クリック時にふりがなを上部に表示
                    return `<span class="inline-block mx-0.5 cursor-pointer border-b-2 border-dashed border-yellow-400 hover:bg-yellow-50 transition-colors px-0.5 font-bold" onclick="revealFurigana(this, '${kanji}', '${furigana}')" title="タップして読み方を表示">${kanji}</span>`;
                } else {
                    return `<ruby class="mx-0.5">${kanji}<rt>${furigana}</rt></ruby>`;
                }
            });
        }

        window.revealFurigana = function(el, kanji, furigana) {
            el.outerHTML = `<ruby class="mx-0.5 bg-yellow-100 rounded px-1 animate-pulse text-blue-900">${kanji}<rt class="text-blue-600 font-bold" style="font-size: 0.65rem;">${furigana}</rt></ruby>`;
        };

        function renderScene() {
            const container = document.getElementById('dialogue-list');
            container.innerHTML = '';
            
            const scene = scenes[appState.currentSceneIndex];
            
            scene.lines.forEach((line, index) => {
                const isSpeaker1 = line.speaker === "Speaker 1";
                const alignment = isSpeaker1 ? "self-start" : "self-end";
                const bgColor = isSpeaker1 ? "speaker-1-bg border border-gray-200" : "speaker-2-bg border border-blue-100";
                const borderRadius = isSpeaker1 ? "rounded-tr-2xl rounded-br-2xl rounded-bl-2xl" : "rounded-tl-2xl rounded-br-2xl rounded-bl-2xl";
                const icon = isSpeaker1 ? "fa-user-tie" : "fa-user";
                const iconColor = isSpeaker1 ? "text-gray-500" : "text-blue-500";

                const jpFormatted = formatJapanese(line.rawJp, appState.hideFurigana);

                let extraContent = '';
                if (appState.showRomaji) {
                    extraContent += `<div class="text-sm text-gray-500 mt-2 font-mono bg-gray-50 p-2 rounded">${line.romaji}</div>`;
                }
                if (appState.showTranslation) {
                    extraContent += `<div class="text-sm text-gray-700 mt-2 italic border-l-2 border-gray-300 pl-2">${line.english}</div>`;
                }

                const html = `
                    <div class="flex gap-3 max-w-[95%] sm:max-w-[85%] ${alignment} fade-in" style="animation-delay: ${index * 0.05}s">
                        ${isSpeaker1 ? `<div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid ${icon} ${iconColor} text-sm"></i></div>` : ''}
                        
                        <div class="flex flex-col gap-1 w-full">
                            <div class="text-xs text-gray-500 font-medium px-1 ${!isSpeaker1 ? 'text-right' : ''}">${line.speaker}</div>
                            <div class="${bgColor} ${borderRadius} p-4 shadow-sm relative group w-full">
                                <div class="flex items-start gap-3 justify-between">
                                    <div class="text-[1.05rem] leading-loose break-words flex-1 tracking-wide font-medium">
                                        ${jpFormatted}
                                    </div>
                                    <button onclick="playAudio('${line.speakText.replace(/'/g, "\\'")}')" class="shrink-0 w-8 h-8 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-400 hover:text-blue-500 flex items-center justify-center transition-colors focus:outline-none focus:ring-2 focus:ring-blue-300" title="Play audio">
                                        <i class="fa-solid fa-volume-high"></i>
                                    </button>
                                </div>
                                ${extraContent}
                            </div>
                        </div>

                        ${!isSpeaker1 ? `<div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid ${icon} ${iconColor} text-sm"></i></div>` : ''}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function playAudio(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            }
        }

        async function playEntireScene() {
            if (!('speechSynthesis' in window)) return;
            
            const playBtnIcon = document.querySelector('#play-scene-btn i');

            if (appState.isPlaying) {
                window.speechSynthesis.cancel();
                appState.isPlaying = false;
                playBtnIcon.className = 'fa-solid fa-play';
                return;
            }

            appState.isPlaying = true;
            playBtnIcon.className = 'fa-solid fa-stop';
            const scene = scenes[appState.currentSceneIndex];
            
            for (let i = 0; i < scene.lines.length; i++) {
                if (!appState.isPlaying) break; 
                
                const line = scene.lines[i];
                
                await new Promise(resolve => {
                    const utterance = new SpeechSynthesisUtterance(line.speakText);
                    utterance.lang = 'ja-JP';
                    utterance.rate = 0.85;
                    utterance.onend = resolve;
                    utterance.onerror = resolve;
                    window.speechSynthesis.speak(utterance);
                });
                
                await new Promise(r => setTimeout(r, 600));
            }
            appState.isPlaying = false;
            playBtnIcon.className = 'fa-solid fa-play';
        }

        function startQuiz() {
            appState.currentQuestionIndex = 0;
            appState.score = 0;
            appState.isAnswering = false;
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            const container = document.getElementById('quiz-body');
            const progress = document.getElementById('quiz-progress');
            
            // Show score if finished
            if (appState.currentQuestionIndex >= quizData.length) {
                progress.innerText = `Result`;
                container.innerHTML = `
                    <div class="text-center py-8 fade-in">
                        <div class="w-20 h-20 mx-auto bg-blue-100 text-blue-500 rounded-full flex items-center justify-center text-4xl mb-4">
                            <i class="fa-solid fa-award"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-gray-800 mb-2">Quiz Completed!</h3>
                        <p class="text-gray-600 mb-6">Your Score: <span class="font-bold text-blue-600 text-xl">${appState.score}</span> / ${quizData.length}</p>
                        <button onclick="startQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                            Try Again
                        </button>
                    </div>
                `;
                return;
            }

            const q = quizData[appState.currentQuestionIndex];
            progress.innerText = `${appState.currentQuestionIndex + 1} / ${quizData.length}`;

            // Create buttons HTML
            let buttonsHtml = '';
            q.choices.forEach((choice, index) => {
                buttonsHtml += `
                    <button onclick="handleAnswer(${index})" class="quiz-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 hover:border-blue-400 hover:bg-blue-50 font-medium text-lg text-gray-700 focus:outline-none">
                        <span class="inline-block w-8 text-center text-gray-400 font-bold mr-2">${index + 1}.</span> ${choice}
                    </button>
                `;
            });

            container.innerHTML = `
                <div class="fade-in">
                    <div class="mb-8 text-center">
                        <p class="text-gray-500 text-sm font-medium mb-2 uppercase tracking-wider">Choose the correct reading</p>
                        <h3 class="text-6xl font-black text-gray-800 tracking-widest my-4 font-['Noto_Sans_JP']">${q.kanji}</h3>
                        <p class="text-gray-400 italic">${q.meaning}</p>
                    </div>
                    <div class="flex flex-col gap-3" id="quiz-choices">
                        ${buttonsHtml}
                    </div>
                </div>
            `;
        }

        window.handleAnswer = function(selectedIndex) {
            if (appState.isAnswering) return;
            appState.isAnswering = true;

            const q = quizData[appState.currentQuestionIndex];
            const buttons = document.querySelectorAll('#quiz-choices button');
            const isCorrect = selectedIndex === q.correct;

            if (isCorrect) {
                appState.score++;
                buttons[selectedIndex].classList.add('correct-answer');
            } else {
                buttons[selectedIndex].classList.add('wrong-answer');
                // Highlight correct answer
                buttons[q.correct].classList.add('correct-answer');
            }

            // Wait 1.2s then next question
            setTimeout(() => {
                appState.currentQuestionIndex++;
                appState.isAnswering = false;
                renderQuizQuestion();
            }, 1200);
        };

        function switchTab(tabId) {
            appState.activeTab = tabId;
            const btnConv = document.getElementById('tab-btn-conv');
            const btnQuiz = document.getElementById('tab-btn-quiz');
            const viewConv = document.getElementById('view-conv');
            const viewQuiz = document.getElementById('view-quiz');

            if (tabId === 'conv') {
                btnConv.className = "px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 hover:bg-gray-50 transition-colors";
                btnQuiz.className = "px-4 py-2 font-medium text-gray-500 border-b-2 border-transparent hover:bg-gray-50 hover:text-gray-700 transition-colors";
                viewConv.classList.remove('hidden');
                viewConv.classList.add('flex');
                viewQuiz.classList.add('hidden');
            } else {
                btnQuiz.className = "px-4 py-2 font-medium text-blue-600 border-b-2 border-blue-600 hover:bg-gray-50 transition-colors";
                btnConv.className = "px-4 py-2 font-medium text-gray-500 border-b-2 border-transparent hover:bg-gray-50 hover:text-gray-700 transition-colors";
                viewQuiz.classList.remove('hidden');
                viewConv.classList.remove('flex');
                viewConv.classList.add('hidden');
                
                // Stop audio if playing
                if (appState.isPlaying) {
                    window.speechSynthesis.cancel();
                    appState.isPlaying = false;
                    document.querySelector('#play-scene-btn i').className = 'fa-solid fa-play';
                }

                // Reset and start quiz if visiting for the first time or want to restart implicitly
                if (appState.currentQuestionIndex === 0 && appState.score === 0) {
                    startQuiz();
                }
            }
        }

        function init() {
            // Populate Scene Selector
            const selector = document.getElementById('scene-selector');
            scenes.forEach((scene, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = sceneTitles[index] || `Scene ${index + 1}`;
                selector.appendChild(option);
            });

            // Conversation Event Listeners
            selector.addEventListener('change', (e) => {
                appState.currentSceneIndex = parseInt(e.target.value);
                window.speechSynthesis.cancel();
                appState.isPlaying = false;
                document.querySelector('#play-scene-btn i').className = 'fa-solid fa-play';
                renderScene();
                document.getElementById('chat-container').scrollTop = 0;
            });

            document.getElementById('toggle-romaji').addEventListener('change', (e) => {
                appState.showRomaji = e.target.checked;
                renderScene();
            });

            document.getElementById('toggle-translation').addEventListener('change', (e) => {
                appState.showTranslation = e.target.checked;
                renderScene();
            });

            document.getElementById('toggle-kanji-test').addEventListener('change', (e) => {
                appState.hideFurigana = e.target.checked;
                renderScene();
            });

            // Tab Event Listeners
            document.getElementById('tab-btn-conv').addEventListener('click', () => switchTab('conv'));
            document.getElementById('tab-btn-quiz').addEventListener('click', () => switchTab('quiz'));

            // Initial Render
            renderScene();
            startQuiz(); // pre-render quiz implicitly
        }

        document.addEventListener('DOMContentLoaded', init);
        
        window.addEventListener('beforeunload', () => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        });

    </script>
</body>
</html>
