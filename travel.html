        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .speaker-1-bg { background-color: #ffffff; }
        .speaker-2-bg { background-color: #f0fdf4; }

        .kanji-hidden {
            display: inline-block;
            background-color: #fef08a; 
            border-bottom: 2px dashed #ca8a04;
            border-radius: 4px;
            padding: 0 4px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .kanji-hidden:hover {
            background-color: #fde047;
        }
        .kanji-revealed {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background-color: #1e40af;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease-out;
            white-space: nowrap;
            z-index: 10;
        }
        .kanji-hidden.show-ruby .kanji-revealed {
            opacity: 1;
            transform: translateX(-50%) translateY(-2px);
        }
    </style>

            { q: "「書類」の読み方は？", options: ["しょるい", "かきるい", "しょいれ", "しょるいす"], answer: 0 },
            { q: "「参加」の読み方は？", options: ["さんか", "まいか", "そうか", "さんがあ"], answer: 0 },
            { q: "「保険証」の読み方は？", options: ["ほけんしょう", "ほけんそう", "ほげんしょう", "ほけんじょ"], answer: 0 },
            { q: "「盗む」の読み方は？", options: ["ぬすむ", "とる", "うばう", "かくす"], answer: 0 },
            { q: "「秘密」の読み方は？", options: ["ひみつ", "ひめつ", "かくし", "ひみづ"], answer: 0 },
            { q: "「議事録」の読み方は？", options: ["ぎじろく", "ぎしろく", "かいぎろく", "ぎじぬき"], answer: 0 }
        ];

        let scenes = [];

        function parseData() {
            const rawScenes = rawData.trim().split('===');
            scenes = rawScenes.map(sceneText => {
                const lines = sceneText.trim().split('\n').filter(line => line.length > 0);
                return {
                    lines: lines.map(line => {
                        const [jpPart, enPart, romajiPart] = line.split('|');
                        const speakerSplit = jpPart.split(':');
                        const speaker = speakerSplit[0].trim();
                        let rawJp = speakerSplit.slice(1).join(':').trim();
                        
                        const speakText = rawJp.replace(/\(.*?\)/g, '');
                        
                        return {
                            speaker: speaker,
                            rawJp: rawJp,
                            speakText: speakText,
                            english: enPart ? enPart.trim() : "Translation not available.",
                            romaji: romajiPart ? romajiPart.trim() : "Romaji not available."
                        };
                    })
                };
            });
        }

        function formatJapanese(rawJp, hideFurigana) {
            return rawJp.replace(/([\u4E00-\u9FFF\u3005]+)\((.*?)\)/g, (match, kanji, ruby) => {
                if (hideFurigana) {
                    return `<span class="kanji-hidden" onclick="revealFurigana(this)"><span class="kanji-text">${kanji}</span><span class="kanji-revealed">${ruby}</span></span>`;
                } else {
                    return `<ruby>${kanji}<rt>${ruby}</rt></ruby>`;
                }
            });
        }

        window.revealFurigana = function(element) {
            element.classList.toggle('show-ruby');
        };

        function renderScene() {
            const container = document.getElementById('dialogue-list');
            container.innerHTML = '';
            
            const scene = scenes[appState.currentSceneIndex];
            
            scene.lines.forEach((line, index) => {
                const isSpeaker1 = line.speaker === "Speaker 1";
                const alignment = isSpeaker1 ? "self-start" : "self-end";
                const bgColor = isSpeaker1 ? "speaker-1-bg border border-gray-200" : "speaker-2-bg border border-green-100";
                const borderRadius = isSpeaker1 ? "rounded-tr-2xl rounded-br-2xl rounded-bl-2xl" : "rounded-tl-2xl rounded-br-2xl rounded-bl-2xl";
                const icon = isSpeaker1 ? "fa-user-tie" : "fa-user";
                const iconColor = isSpeaker1 ? "text-gray-500" : "text-green-600";

                const jpFormatted = formatJapanese(line.rawJp, appState.hideFurigana);

                let extraContent = '';
                if (appState.showRomaji) {
                    extraContent += `<div class="text-sm text-gray-500 mt-2 font-mono bg-gray-50 p-2 rounded">${line.romaji}</div>`;
                }
                if (appState.showTranslation) {
                    extraContent += `<div class="text-sm text-gray-700 mt-2 italic border-l-2 border-gray-300 pl-2">${line.english}</div>`;
                }

                const isMuted = appState.roleplayMutedSpeaker === line.speaker;
                const blurClass = isMuted ? "blur-sm opacity-50 hover:blur-none hover:opacity-100 transition-all duration-300 cursor-pointer" : "";
                const titleText = isMuted ? "title='Hover to reveal (Roleplay mode)'" : "";

                const html = `
                    <div class="flex gap-3 max-w-[95%] sm:max-w-[85%] ${alignment} fade-in" style="animation-delay: ${index * 0.05}s">
                        ${isSpeaker1 ? `<div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid ${icon} ${iconColor} text-sm"></i></div>` : ''}
                        
                        <div class="flex flex-col gap-1 w-full">
                            <div class="text-xs text-gray-500 font-medium px-1 ${!isSpeaker1 ? 'text-right' : ''}">${line.speaker} ${isMuted ? ' <span class="text-purple-600 font-bold ml-1"><i class="fa-solid fa-microphone-lines"></i> Your Turn</span>' : ''}</div>
                            <div class="${bgColor} ${borderRadius} p-4 shadow-sm relative group w-full transition-shadow duration-300">
                                <div class="flex items-start gap-3 justify-between">
                                    <div class="flex-1 ${blurClass}" ${titleText}>
                                        <div class="text-[1.05rem] leading-loose break-words tracking-wide font-medium">
                                            ${jpFormatted}
                                        </div>
                                        ${extraContent}
                                    </div>
                                    <button onclick="playAudio('${line.speakText.replace(/'/g, "\\'")}')" class="shrink-0 w-8 h-8 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-400 hover:text-blue-600 flex items-center justify-center transition-colors focus:outline-none focus:ring-2 focus:ring-blue-300" title="Play audio">
                                        <i class="fa-solid fa-volume-high"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        ${!isSpeaker1 ? `<div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center shrink-0 mt-1"><i class="fa-solid ${icon} ${iconColor} text-sm"></i></div>` : ''}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function playAudio(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }
        }

        async function playEntireScene() {
            if (!('speechSynthesis' in window)) return;
            
            const playBtnIcon = document.querySelector('#play-scene-btn i');

            if (appState.isPlaying) {
                window.speechSynthesis.cancel();
                appState.isPlaying = false;
                playBtnIcon.className = 'fa-solid fa-play';
                document.querySelectorAll('#dialogue-list > div > div > div.p-4').forEach(b => b.classList.remove('ring-2', 'ring-blue-400', 'ring-purple-400'));
                return;
            }

            appState.isPlaying = true;
            playBtnIcon.className = 'fa-solid fa-stop';
            const scene = scenes[appState.currentSceneIndex];
            
            for (let i = 0; i < scene.lines.length; i++) {
                if (!appState.isPlaying) break; 
                
                const line = scene.lines[i];
                const isMuted = appState.roleplayMutedSpeaker === line.speaker;

                const allMessageBubbles = document.querySelectorAll('#dialogue-list > div > div > div.p-4');
                if (allMessageBubbles[i]) {
                    allMessageBubbles.forEach(b => b.classList.remove('ring-2', 'ring-blue-400', 'ring-purple-400'));
                    allMessageBubbles[i].classList.add('ring-2', isMuted ? 'ring-purple-400' : 'ring-blue-400');
                    allMessageBubbles[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                
                if (isMuted) {
                    const waitTime = 1500 + (line.speakText.length * 150);
                    await new Promise(r => setTimeout(r, waitTime));
                } else {
                    await new Promise(resolve => {
                        const utterance = new SpeechSynthesisUtterance(line.speakText);
                        utterance.lang = 'ja-JP';
                        utterance.rate = 0.85;
                        utterance.onend = resolve;
                        utterance.onerror = resolve;
                        window.speechSynthesis.speak(utterance);
                    });
                }
                
                await new Promise(r => setTimeout(r, 600));
            }

            if (appState.isPlaying) {
                document.querySelectorAll('#dialogue-list > div > div > div.p-4').forEach(b => b.classList.remove('ring-2', 'ring-blue-400', 'ring-purple-400'));
            }

            appState.isPlaying = false;
            playBtnIcon.className = 'fa-solid fa-play';
        }

        function startQuiz() {
            appState.score = 0;
            appState.currentQuestionIndex = 0;
            
            document.getElementById('quiz-intro').classList.add('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('quiz-area').classList.remove('hidden');
            
            loadQuestion();
        }

        function loadQuestion() {
            appState.isAnswering = false;
            const qData = quizData[appState.currentQuestionIndex];
            
            document.getElementById('quiz-progress').innerText = `Question ${appState.currentQuestionIndex + 1} / ${quizData.length}`;
            document.getElementById('quiz-score').innerText = `Score: ${appState.score}`;
            document.getElementById('quiz-question').innerText = qData.q;
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            const correctAnswer = qData.options[qData.answer];
            const shuffledOptions = [...qData.options].sort(() => Math.random() - 0.5);
            const currentCorrectIndex = shuffledOptions.indexOf(correctAnswer);
            
            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full bg-white border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-gray-700 font-bold py-4 px-6 rounded-xl text-lg sm:text-xl transition-all shadow-sm";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, currentCorrectIndex, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, correctIndex, btnElement) {
            if (appState.isAnswering) return;
            appState.isAnswering = true;
            
            const isCorrect = selectedIndex === correctIndex;
            
            if (isCorrect) {
                appState.score++;
                btnElement.classList.remove('border-gray-200', 'hover:border-blue-500', 'hover:bg-blue-50', 'text-gray-700');
                btnElement.classList.add('bg-green-500', 'text-white', 'border-green-500');
            } else {
                btnElement.classList.remove('border-gray-200', 'hover:border-blue-500', 'hover:bg-blue-50', 'text-gray-700');
                btnElement.classList.add('bg-red-500', 'text-white', 'border-red-500');
                
                const allButtons = document.getElementById('quiz-options').children;
                allButtons[correctIndex].classList.remove('border-gray-200');
                allButtons[correctIndex].classList.add('border-green-500', 'bg-green-50', 'text-green-700');
            }
            
            document.getElementById('quiz-score').innerText = `Score: ${appState.score}`;
            
            setTimeout(() => {
                appState.currentQuestionIndex++;
                if (appState.currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResult();
                }
            }, 1200);
        }

        function showResult() {
            document.getElementById('quiz-area').classList.add('hidden');
            document.getElementById('quiz-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = appState.score;
        }

        function switchTab(tabId) {
            appState.activeTab = tabId;
            
            const convBtn = document.getElementById('tab-btn-conv');
            const quizBtn = document.getElementById('tab-btn-quiz');
            const convDiv = document.getElementById('tab-conv');
            const quizDiv = document.getElementById('tab-quiz');
            
            if (tabId === 'conv') {
                convBtn.className = "px-4 py-2 rounded-md bg-white shadow text-blue-600 font-medium text-sm transition-all";
                quizBtn.className = "px-4 py-2 rounded-md text-gray-500 hover:text-gray-700 font-medium text-sm transition-all";
                convDiv.classList.remove('hidden');
                quizDiv.classList.add('hidden');
            } else {
                quizBtn.className = "px-4 py-2 rounded-md bg-white shadow text-blue-600 font-medium text-sm transition-all";
                convBtn.className = "px-4 py-2 rounded-md text-gray-500 hover:text-gray-700 font-medium text-sm transition-all";
                quizDiv.classList.remove('hidden');
                convDiv.classList.add('hidden');
                
                document.getElementById('quiz-intro').classList.remove('hidden');
                document.getElementById('quiz-area').classList.add('hidden');
                document.getElementById('quiz-result').classList.add('hidden');
            }
        }

        window.onload = () => {
            parseData();

            const selector = document.getElementById('scene-selector');
            scenes.forEach((_, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.text = sceneTitles[i] || `Scene ${i + 1}`;
                selector.appendChild(opt);
            });

            selector.addEventListener('change', (e) => {
                appState.currentSceneIndex = parseInt(e.target.value);
                if(appState.isPlaying) playEntireScene(); 
                renderScene();
            });

            document.getElementById('toggle-romaji').addEventListener('change', (e) => {
                appState.showRomaji = e.target.checked;
                renderScene();
            });

            document.getElementById('toggle-translation').addEventListener('change', (e) => {
                appState.showTranslation = e.target.checked;
                renderScene();
            });

            document.getElementById('toggle-kanji-test').addEventListener('change', (e) => {
                appState.hideFurigana = e.target.checked;
                renderScene();
            });

            document.getElementById('roleplay-selector').addEventListener('change', (e) => {
                appState.roleplayMutedSpeaker = e.target.value;
                renderScene();
            });

            document.getElementById('tab-btn-conv').addEventListener('click', () => switchTab('conv'));
            document.getElementById('tab-btn-quiz').addEventListener('click', () => switchTab('quiz'));

            renderScene();
        };
    </script>
</body>
</html>
